<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fontawesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">
    <header>
        <nav class="bg-white shadow p-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div>
                    <img src="./assets/github-logo.png" alt="" class="h-14 w-14">
                </div>
                <h1 class="text-xl font-bold hidden md:block">GitHub Issues Tracker</h1>

            </div>
            <div class="flex gap-2">
                <input id="searchInput" class="border px-3 py-2 rounded" placeholder="Search issues..." />
                <button id="searchBtn" class="bg-[#4A00FF] text-white px-4 py-2 rounded cursor-pointer"><i
                        class="fa-solid fa-plus"></i> New Issue</button>
            </div>

        </nav>
    </header>

    <main>
        <section class="max-w-7xl mx-auto  mt-6 px-4">
            <div class="flex gap-4 mb-6 bg-white p-4 rounded-md">
                <button class="tabBtn bg-[#4A00FF] text-white px-4 py-2 rounded" data-tab="all">All</button>
                <button class="tabBtn bg-gray-200 px-4 py-2 rounded" data-tab="open">Open</button>
                <button class="tabBtn bg-gray-200 px-4 py-2 rounded" data-tab="closed">Closed</button>
            </div>

            <div class="flex justify-between items-center mb-6 bg-[#FFFFFF] shadow p-4 rounded-md">
                <div class="flex items-center gap-2">
                    <div class="">
                        <img src="./assets/Aperture.png" alt=""
                            class="flex justify-center items-center bg-[#ECE4FF] w-12 h-12 rounded-full p-2">
                    </div>
                    <div>
                        <span class="text-lg font-semibold" id="issueCount">0 Issues</span> <br>
                        <span class="text-gray-500">Track and manage your project issues</span>
                    </div>
                </div>
                <div class="flex gap-4 text-sm">
                    <span class="text-green-600">● Open</span>
                    <span class="text-purple-600">● Closed</span>
                </div>
            </div>

            <div id="loader" class="text-center hidden">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-purple-600 mx-auto"></div>
            </div>

            <div id="issuesContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
            </div>
        </section>
    </main>

    <script src="scripts/index.js"></script>
</body>

</html>
