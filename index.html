<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fontawesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">
    <header>
        <nav class="bg-white shadow p-4 flex justify-between items-center">
           <div class="flex items-center gap-2">
            <div>
                <img src="./assets/github-logo.png" alt="" class="h-14 w-14">
             </div>
             <h1 class="text-xl font-bold hidden md:block">GitHub Issues Tracker</h1>
             
           </div>
            <div class="flex gap-2">
               <input id="searchInput" class="border px-3 py-2 rounded" placeholder="Search issues..." />
                <button id="searchBtn" class="bg-[#4A00FF] text-white px-4 py-2 rounded cursor-pointer"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>

        </nav>
    </header>
</body>

</html>
