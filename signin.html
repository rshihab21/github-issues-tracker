<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign | Github Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <section class="bg-gray-100 flex items-center justify-center min-h-screen">
        <div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-md">
            <div class="flex justify-center mb-4">
                <img src="./assets/github-logo.png" alt="">
            </div>
            <h2 class="text-center text-2xl font-bold text-[#1F2937]">GitHub Issues Tracker</h2>
            <p class="text-center text-[#64748B] mb-6"">Sign in to manage your issues</p>

          <div>
              <form id="signInForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" placeholder="Enter Username"
                        class="w-full border rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500" />
                    <p class="text-xs text-purple-600 mt-1">Default: admin</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" placeholder="Enter Password"
                        class="w-full border rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500" />
                    <p class="text-xs text-purple-600 mt-1">Default: admin123</p>
                </div>
                <button type="submit"
                    class="cursor-pointer w-full bg-[#4A00FF] text-white py-2 rounded-md font-semibold hover:opacity-90">
                    Sign In
                </button>
            </form>
        </div>
        <div class="flex items-center my-6">
            <div class="flex-grow border-t"></div>
            <span class="mx-3 text-gray-400 text-sm">OR</span>
            <div class="flex-grow border-t"></div>
        </div>
        <div class="bg-gray-100 p-4 rounded-md text-center text-sm">
            <p class="font-semibold text-gray-700">Demo Credentials:</p>
            <p>Username: <span class="font-medium">admin</span></p>
            <p>Password: <span class="font-medium">admin123</span></p>
        </div>
        <p id="message" class="text-center mt-4 text-sm"></p>
        </div>
    </section>

    <script src="scripts/SignIn.js"></script>
</body>

</html>
